<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GRACE-X Gallery™ - Media Browser</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #0a0e1a 0%, #1a0a1a 100%);
            color: #ffffff;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            overflow-x: hidden;
        }
        
        .container {
            padding: 20px;
            min-height: 100vh;
        }
        
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .title {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, #00f0ff, #ff00ff, #8800ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        
        .btn {
            padding: 10px 20px;
            background: rgba(136,0,255,0.2);
            border: 1px solid rgba(136,0,255,0.5);
            border-radius: 12px;
            color: #8800ff;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.9rem;
        }
        
        .btn:hover {
            background: rgba(136,0,255,0.3);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(136,0,255,0.3);
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #00f0ff, #ff00ff);
            color: #000;
            border: none;
        }
        
        .breadcrumb {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 20px;
            padding: 15px 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 12px;
            flex-wrap: wrap;
        }
        
        .breadcrumb-item {
            color: rgba(255,255,255,0.7);
            cursor: pointer;
            transition: color 0.3s;
        }
        
        .breadcrumb-item:hover {
            color: #00f0ff;
        }
        
        .breadcrumb-separator {
            color: rgba(255,255,255,0.3);
        }
        
        .folder-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .folder-item {
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            border: 1px solid rgba(255,255,255,0.1);
            cursor: pointer;
            transition: all 0.3s;
            text-align: center;
        }
        
        .folder-item:hover {
            background: rgba(255,255,255,0.1);
            transform: translateY(-4px);
            box-shadow: 0 8px 30px rgba(0,240,255,0.2);
        }
        
        .folder-icon {
            font-size: 3rem;
            margin-bottom: 10px;
        }
        
        .folder-name {
            font-weight: 600;
            margin-bottom: 5px;
        }
        
        .folder-count {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        .media-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }
        
        .media-item {
            position: relative;
            aspect-ratio: 16/9;
            border-radius: 12px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .media-item:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0,240,255,0.3);
            z-index: 10;
        }
        
        .media-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .media-item video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .media-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(to top, rgba(0,0,0,0.8), transparent);
            padding: 15px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .media-item:hover .media-overlay {
            opacity: 1;
        }
        
        .media-name {
            font-weight: 600;
            margin-bottom: 5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        
        .media-size {
            font-size: 0.85rem;
            opacity: 0.7;
        }
        
        .media-type-badge {
            position: absolute;
            top: 10px;
            right: 10px;
            padding: 5px 10px;
            background: rgba(0,0,0,0.7);
            border-radius: 8px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        
        .media-type-badge.video {
            background: rgba(255,0,255,0.8);
            color: #000;
        }
        
        .media-type-badge.image {
            background: rgba(0,240,255,0.8);
            color: #000;
        }
        
        .viewer-modal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.95);
            z-index: 10000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .viewer-modal.active {
            display: flex;
        }
        
        .viewer-content {
            max-width: 90vw;
            max-height: 90vh;
            position: relative;
        }
        
        .viewer-content img,
        .viewer-content video {
            max-width: 100%;
            max-height: 90vh;
            border-radius: 12px;
        }
        
        .viewer-close {
            position: absolute;
            top: -40px;
            right: 0;
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1rem;
        }
        
        .viewer-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            padding: 15px 20px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            color: #fff;
            cursor: pointer;
            font-size: 1.5rem;
        }
        
        .viewer-nav.prev {
            left: -60px;
        }
        
        .viewer-nav.next {
            right: -60px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        @media (max-width: 768px) {
            .media-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            
            .folder-list {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
                gap: 10px;
            }
            
            .title {
                font-size: 1.8rem;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1 class="title">GRACE-X Gallery™</h1>
                <p style="opacity: 0.8; margin-top: 5px;">Public Media Browser - Images & Videos</p>
            </div>
            <div class="controls">
                <button class="btn" onclick="goHome()">🏠 Home</button>
                <button class="btn" onclick="refreshGallery()">🔄 Refresh</button>
                <button class="btn btn-primary" onclick="toggleView()">📋 List</button>
            </div>
        </div>
        
        <div class="breadcrumb" id="breadcrumb">
            <span class="breadcrumb-item" onclick="navigateTo('')">Home</span>
        </div>
        
        <div id="folder-list" class="folder-list"></div>
        <div id="media-grid" class="media-grid"></div>
        <div id="loading" class="loading" style="display:none;">Loading...</div>
        <div id="empty-state" class="empty-state" style="display:none;">
            <div class="empty-state-icon">📁</div>
            <p>No media files found in this folder</p>
        </div>
        
        <!-- Media Viewer Modal -->
        <div class="viewer-modal" id="viewer-modal">
            <div class="viewer-content">
                <button class="viewer-close" onclick="closeViewer()">✕ Close</button>
                <button class="viewer-nav prev" onclick="prevMedia()">‹</button>
                <div id="viewer-media"></div>
                <button class="viewer-nav next" onclick="nextMedia()">›</button>
            </div>
        </div>
    </div>
    
    <script src="assets/js/gallery.js"></script>
    

    <!-- UNIVERSAL VOICE ORB -->
    <script src="../assets/js/voiceTTS.js"></script>
    <script src="../assets/js/voiceAssistant.js"></script>
    <script>
      window.addEventListener('DOMContentLoaded', () => {
        if (window.VoiceAssistant && typeof window.VoiceAssistant.start === 'function') {
          setTimeout(() => window.VoiceAssistant.start(), 1000);
        }
      });
    </script>

</body>
</html>
