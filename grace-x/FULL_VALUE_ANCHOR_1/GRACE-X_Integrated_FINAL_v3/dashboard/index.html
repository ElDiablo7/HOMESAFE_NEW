<!DOCTYPE html>

        .value { font-size: 2em; font-weight: bold; color: #38bdf8; }
        .btn { display: inline-block; background: #38bdf8; color: #0f172a; padding: 10px 20px; text-decoration: none; border-radius: 6px; font-weight: bold; margin-top: 20px; }

</head>
<body>

    <div class="visual">
        <img src="../visuals/grace_x_ecosystem.jpg" alt="Ecosystem Visualization">
        <p style="color: #94a3b8; margin-top: 10px;">Figure 1: The GRACE-X AI Ecosystem Architecture</p>
    </div>

    <div class="metrics">
        <div class="card">
            <div class="value">£47M</div>
            <div>Gov Tender Opportunity</div>
        </div>
        <div class="card">

</html>
